# Toasty TOML-driven aliases for Windows PowerShell.
# Same format as linux/photontoaster/aliases.toml but with Windows-appropriate commands.
# Each entry becomes:  function global:NAME { & base-command @flags @args }
# Entries are skipped when the base command isn't installed.
# Sections are cosmetic (for organization) — all aliases load the same way.

[color_overrides]
rg = "rg --color=always --hyperlink-format=default"
fd = "fd --color=always --hyperlink"
bat = "bat --color=always --hyperlink=auto"
jq = "jq -C"

[git]
gs = "git status"
ga = "git add"
gc = "git commit"
gp = "git pull"
gd = "git diff"
gl = "git log --oneline --decorate --graph -20"
gst = "git status -sb"
gco = "git checkout"
gcb = "git checkout -b"
gcm = "git commit -m"

[tools]
lg = "lazygit"
d = "delta"
kb = "tldr"
tl = "tldr"
bench = "hyperfine"
http = "xh"
hex = "hexyl"
fm = "yazi"
br = "broot"

[utility]
ccat = "bat --color=always --hyperlink=auto --paging=never --style=header,grid,numbers,changes"
fda = "fd -HI --color=always --hyperlink"
rgf = "rg -n --color=always --hyperlink-format=default"
jqp = "jq -C ."
