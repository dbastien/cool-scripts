# PhotonToaster alias definitions — single source of truth
# Run generate_aliases.sh to regenerate aliases.sh.
#
# [color_overrides] — always-on aliases that force color output
# [eza]             — eza-based directory listing shortcuts
# [navigation]      — cd shortcuts and shell helpers
# [git]             — git command shortcuts
# [tools]           — modern CLI tool aliases (guarded by command existence)
# [replacements]    — modern replacements for classic commands (guarded)
# [tmux]            — tmux shortcuts
# [utility]         — compound utility aliases

[color_overrides]
grep = "grep --color=always"
diff = "diff --color=always"
rg = "rg --color=always --hyperlink-format=default"
fd = "fd --color=always --hyperlink"
jq = "jq -C"
ip = "ip -c"
bat = "bat --color=always --hyperlink=auto"
eza = "eza --icons=always --group-directories-first --git --color=always --hyperlink"

# ls/la/ll/lla/lt/tree are set dynamically based on general.ls_tool in config.toml

[navigation]
reload = "exec $SHELL -l"
cls = "clear"
v = "$EDITOR"
mkd = "mkdir -pv"
"cd.." = "cd .."
".." = "cd .."
"..." = "cd ../.."
"...." = "cd ../../.."

[git]
gs = "git status"
ga = "git add"
gc = "git commit"
gp = "git pull"
gd = "git diff"
gl = "git log --oneline --decorate --graph -20"
gst = "git status -sb"
gco = "git checkout"
gcb = "git checkout -b"
gcm = "git commit -m"

[tools]
lg = "lazygit"
calc = "qalc"
d = "delta"
gpu = "nvtop"
tv = "television"
mcpp = "mcp-probe"
bw = "bandwhich"
samp = "sampler"
todo = "task"
snippets = "pet"
getgh = "eget"
kb = "tldr"
tl = "tldr"
jl = "jless"
md = "glow"
hx = "helix"
fm = "yazi"
xp = "xplr"
br = "broot"
bench = "hyperfine"
http = "xh"
hex = "hexyl"

[replacements]
top = "btop"
df = "duf"
du = "dust"
ps = "procs"
dig = "doggo"
x = "ouch decompress"

[tmux]
t = "tmux -2"
ta = "tmux attach -t"
tls = "tmux ls"
tn = "tmux new -s"

[utility]
jqp = "jq -C ."
fda = "fd -HI --color=always --hyperlink"
ccat = "bat --color=always --hyperlink=auto --paging=never --style=header,grid,numbers,changes"
ports = "ss -tulpn"
ipbrief = "ip -c -br a"
ff = "plocate"
rgf = "rg -n --color=always --hyperlink-format=default"
cronview = "cronboard"
j = "z"
