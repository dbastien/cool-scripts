# PhotonToaster tool help reference
# Documents how each tool exposes help/usage info and flag formatting style.
# Used by build-flag-cache.sh to extract flags and descriptions.
#
# Fields:
#   help_cmd    = primary help invocation (most tools)
#   help_alt    = fallback if help_cmd fails
#   man         = man page name (if different from binary)
#   flag_style  = "gnu" (--long, -s) | "go" (-long) | "mixed"
#   description = one-liner for humans

[rg]
help_cmd = "rg --help"
man = "rg"
flag_style = "gnu"
description = "Recursively search file contents with regex"

[fd]
help_cmd = "fd --help"
man = "fd"
flag_style = "gnu"
description = "Fast file finder (find replacement)"

